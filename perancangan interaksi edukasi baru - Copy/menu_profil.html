<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profil Pengembang</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:'Fredoka', sans-serif;
    background:linear-gradient(to bottom,#87CEEB,#e0f7ff);
}

/* ===== TOMBOL KEMBALI ===== */
.back-btn{
    position:absolute;
    top:20px;
    left:20px;
    background:white;
    padding:10px 18px;
    border-radius:12px;
    text-decoration:none;
    color:#333;
    font-weight:600;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
    transition:0.3s;
}

.back-btn:hover{
    transform:scale(1.05);
}

/* ===== CONTAINER ===== */
.container{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* ===== CARD PROFIL ===== */
.profile-card{
    background:white;
    width:750px;
    padding:45px;
    border-radius:25px;
    box-shadow:0 15px 35px rgba(0,0,0,0.2);
    animation:fadeIn 1s ease;

    display:flex;
    align-items:center;
    gap:40px;
}

/* ===== FOTO ===== */
.profile-img{
    width:180px;
    height:180px;
    border-radius:50%;
    object-fit:cover;
    border:6px solid #38bdf8;

    animation:float 3s ease-in-out infinite;
    transition:0.4s;
}

.profile-img:hover{
    transform:scale(1.08);
    box-shadow:0 0 25px #38bdf8;
}

/* animasi melayang */
@keyframes float{
    0%{ transform:translateY(0px); }
    50%{ transform:translateY(-12px); }
    100%{ transform:translateY(0px); }
}

/* ===== DATA PROFIL ===== */
.profile-info{
    flex:1;
}

.title{
    font-size:26px;
    font-weight:600;
    color:#0c4a6e;
    margin-bottom:20px;
}

/* tiap baris */
.info{
    font-size:18px;
    color:#0369a1;
    margin:10px 0;
    line-height:1.7;
}

.label{
    font-weight:600;
    color:#0c4a6e;
}

/* animasi muncul */
@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(40px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>
</head>

<body>

<a href="index.html" class="back-btn">⬅ Keluar</a>

<div class="container">

    <div class="profile-card">

        <!-- FOTO -->
        <img src="fachri.img" class="profile-img">

        <!-- DATA -->
        <div class="profile-info">

            <div class="title">Profil Mahasiswa</div>

            <div class="info">
                <span class="label">Nama Mahasiswa :</span> Fachri Malaya
            </div>

            <div class="info">
                <span class="label">Nim :</span> 19220944
            </div>

            <div class="info">
                <span class="label">Program Studi :</span> Sistem Informasi
            </div>

            <div class="info">
                <span class="label">Fakultas :</span> Teknik Informatika
            </div>

            <div class="info">
                <span class="label">Universitas :</span> Bina Sarana Informatika
            </div>

            <div class="info">
                <span class="label">Tahun :</span> 2026
            </div>

        </div>

    </div>

</div>

</body>
</html>
