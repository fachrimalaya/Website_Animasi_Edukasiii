<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Game Gempa Bumi</title>

<style>

/* ================= BACKGROUND GEMPA ================= */
body{
font-family:Fredoka, sans-serif;
text-align:center;
margin:0;
overflow:hidden;
background:linear-gradient(#c2b280,#8b6f47);
}

/* retakan tanah */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background-image:
linear-gradient(45deg, rgba(0,0,0,.15) 2px, transparent 2px),
linear-gradient(-45deg, rgba(0,0,0,.15) 2px, transparent 2px);
background-size:60px 60px;
opacity:.3;
pointer-events:none;
}

/* ================= SHAKE GEMPA ================= */
.shake{
animation:quake .4s;
}

@keyframes quake{
0%{transform:translate(0)}
25%{transform:translate(4px,-4px)}
50%{transform:translate(-4px,4px)}
75%{transform:translate(4px,4px)}
100%{transform:translate(0)}
}

/* ================= HEADER ================= */
header{
background:#f8961e;
color:white;
padding:15px;
font-size:22px;
font-weight:bold;
}

/* ================= BACK BUTTON ================= */
.back-btn{
position:absolute;
top:15px;
left:15px;
background:white;
padding:8px 14px;
border-radius:10px;
text-decoration:none;
font-weight:bold;
color:#333;
box-shadow:0 3px 8px rgba(0,0,0,0.2);
}

/* ================= KARAKTER ================= */
.earth{
font-size:95px;
animation:bounce 1s infinite alternate;
}

@keyframes bounce{
from{transform:translateY(0)}
to{transform:translateY(-12px)}
}

/* ================= CHAT ================= */
.bubble{
background:rgba(255,255,255,.9);
backdrop-filter:blur(6px);
padding:12px 20px;
border-radius:20px;
display:inline-block;
margin:15px;
box-shadow:0 4px 10px rgba(0,0,0,.2);
min-height:45px;
}

/* ================= BUTTON ================= */
button{
padding:10px 18px;
margin:8px;
border:none;
border-radius:10px;
cursor:pointer;
background:#f8961e;
color:white;
font-weight:bold;
transition:.2s;
}

button:hover{
transform:scale(1.05);
}

.star{
font-size:35px;
color:gold;
}

</style>
</head>

<body id="body">

<header>🌎 Game Gempa Bumi</header>

<a href="menu_quiz.html" class="back-btn">⬅ Kembali</a>

<!-- AUDIO -->
<audio id="bgm" src="backsound_quiz.mp3" loop></audio>
<audio id="benar" src="benar.mp3"></audio>
<audio id="salah" src="salah.mp3"></audio>

<div class="bubble" id="bubble"></div>
<div class="earth" id="earth">🌎🙂</div>

<h3 id="progress"></h3>
<h2 id="question"></h2>
<div id="answers"></div>

<h2 id="result"></h2>
<div id="stars"></div>

<!-- ✅ tombol disembunyikan dulu -->
<button id="restartBtn" onclick="restart()" style="display:none;">
🔁 Main Lagi
</button>

<script>

/* ===== AUTO PLAY MUSIC ===== */
document.body.addEventListener("click",()=>{
document.getElementById("bgm").play();
},{once:true});

/* ===== DATA QUIZ ===== */
const quiz=[
{q:"Gempa terjadi karena?",a:["Lempeng bumi","Awan","Hujan"],c:0},
{q:"Saat gempa kita?",a:["Berlindung","Lari panik","Main HP"],c:0},
{q:"Yang dilindungi?",a:["Kepala","Sepatu","Tas"],c:0},
{q:"Tempat aman?",a:["Bawah meja","Dekat kaca","Tangga"],c:0},
{q:"Sikap saat gempa?",a:["Tenang","Panik","Teriak"],c:0}
{q:"bagaimana kalo gempa",a:["tidur,mandi,lari ketempat aman"],c:0}
];

let i=0;
let score=0;

/* ===== TEXT KETIK ===== */
function typeText(text){
let el=document.getElementById("bubble");
el.innerHTML="";
let n=0;

let typing=setInterval(()=>{
el.innerHTML+=text.charAt(n);
n++;
if(n>=text.length) clearInterval(typing);
},30);
}

/* ===== LOAD SOAL ===== */
function load(){

if(i===0){
typeText("Halo! Aku Bumi 🌎 Yuk belajar menghadapi Gempa!");
}

if(i>=quiz.length){
finish();
return;
}

progress.innerHTML="Soal "+(i+1)+" / "+quiz.length;
question.innerHTML=quiz[i].q;
answers.innerHTML="";

quiz[i].a.forEach((p,x)=>{
answers.innerHTML+=
`<button onclick="check(${x})">${p}</button>`;
});
}

/* ===== EFEK GEMPA ===== */
function shakeScreen(){
const body=document.getElementById("body");
body.classList.add("shake");

setTimeout(()=>{
body.classList.remove("shake");
},400);
}

/* ===== CEK JAWABAN ===== */
function check(x){

let earth=document.getElementById("earth");

if(x===quiz[i].c){
score++;
earth.innerHTML="🌎😊";
document.getElementById("benar").play();
}else{
earth.innerHTML="🌎😢";
document.getElementById("salah").play();
shakeScreen();
}

i++;
setTimeout(load,600);
}

/* ===== FINISH ===== */
function finish(){

question.innerHTML="Skor Kamu "+score+"/"+quiz.length;
answers.innerHTML="";

let star=3;
if(score<5) star=2;
if(score<=2) star=1;

stars.innerHTML="⭐".repeat(star);

/* ✅ tombol muncul setelah skor */
document.getElementById("restartBtn").style.display="inline-block";

let earth=document.getElementById("earth");

if(score===quiz.length){
earth.innerHTML="🌎😁";
typeText("Hebat! Kamu siap menghadapi gempa!");
}else{
earth.innerHTML="🌎🙂";
typeText("Bagus! Tetap belajar agar selalu siap!");
}
}

/* ===== RESTART ===== */
function restart(){
i=0;
score=0;
stars.innerHTML="";
earth.innerHTML="🌎🙂";
document.getElementById("restartBtn").style.display="none";
load();
}

load();

</script>

</body>
</html>
